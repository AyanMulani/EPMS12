<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>EPMS - Employee Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<style>
body {
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.login-container {
    max-width: 400px;
    width: 100%;
    padding: 20px;
}
.login-card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
    padding: 30px;
}
.navbar-brand {
    font-weight: bold;
    color: #2f5566 !important;
}
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg fixed-top" style="background:#2f5566">
<div class="container-fluid">
<a class="navbar-brand" href="/">Employee Payroll Management System</a>
<div class="d-flex">
<a class="btn btn-outline-light btn-sm" href="/login">Admin Login</a>
</div>
</div>
</nav>
<div class="login-container">
<div class="login-card">
<h4 class="text-center mb-4" style="color:#2f5566">Employee Login</h4>
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}
<div class="alert alert-{{ category }}">{{ message }}</div>
{% endfor %}
{% endif %}
{% endwith %}
<form method="POST" action="{{ url_for('employee_login') }}">
<div class="mb-3">
<label>Employee Code</label>
<input type="text" name="emp_code" class="form-control" placeholder="Enter your employee code" required>
</div>
<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control" placeholder="Enter your password" required>
</div>
<button type="submit" class="btn btn-primary w-100" style="background:#2f5566;border-color:#2f5566">Login</button>
</form>
<div class="text-center mt-3">
<a href="/login" style="color:#2f5566">Back to Admin Login</a>
</div>
</div>
</div>
</body>
</html>
