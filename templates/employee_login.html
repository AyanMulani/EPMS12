<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>EPMS – Employee Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

<style>

/* ===== BACKGROUND ===== */
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#059669);
}

/* ===== CARD ===== */
.login-card{
    width:100%;
    max-width:400px;
    padding:40px;
    border-radius:20px;
    background:#1e293b;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
    color:white;
    text-align:center;
}

/* ===== TITLE ===== */
.logo{
    font-size:22px;
    font-weight:600;
    letter-spacing:0;
}

.logo span{
    background:none;
    -webkit-text-fill-color:white;
}

.subtitle{
    font-size:14px;
    color:#94a3b8;
    margin-bottom:30px;
}

/* ===== INPUT ===== */
.input-wrapper{
    position:relative;
    margin-bottom:18px;
}

.input-wrapper i{
    position:absolute;
    top:50%;
    left:12px;
    transform:translateY(-50%);
    color:#94a3b8;
}

.form-control{
    width:100%;
    padding:12px 12px 12px 35px;
    border-radius:10px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
}

.form-control::placeholder{
    color:#64748b;
}

.form-control:focus{
    outline:none;
    border-color:#10b981;
    box-shadow:none;
}

/* ===== BUTTON ===== */
.btn-login{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    font-weight:600;
    background:#10b981;
    color:white;
    transition:0.2s;
}

.btn-login:hover{
    background:#059669;
}

/* ===== SWITCH ===== */
.login-switch{
    margin-top:18px;
}

.login-switch a{
    color:#10b981;
    text-decoration:none;
    font-size:14px;
}

.login-switch a:hover{
    text-decoration:underline;
}

/* ===== FOOTER ===== */
.small-text{
    margin-top:25px;
    font-size:12px;
    color:#64748b;
}

/* ===== ALERT ===== */
.alert{
    border-radius:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        <span>EPMS</span>
    </div>

    <div class="subtitle">
        Employee Portal
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('employee_login') }}">

        <div class="input-wrapper">
            <i class="fa fa-id-card"></i>
            <input type="text" name="emp_code" class="form-control" placeholder="Employee Code" required>
        </div>

        <div class="input-wrapper">
            <i class="fa fa-lock"></i>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>

        <button class="btn-login">Login</button>

    </form>

    <div class="login-switch">
        <a href="{{ url_for('login') }}">← Admin Login</a>
    </div>

    <div class="small-text">
        © 2026 By B8 Team 
    </div>

</div>

</body>
</html>
